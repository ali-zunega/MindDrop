<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon e Iconos -->
  <link rel="icon" type="image/svg+xml" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- SEO Básico -->
  <title>MindDrop | Organiza tus notas e ideas de forma simple</title>
  <meta name="description"
    content="MindDrop es la aplicación web ideal para estudiantes y profesionales. Organiza tus anotaciones personales, materiales de estudio y tareas en un flujo dinámico.">
  <meta name="keywords" content="notas, organización, estudiantes, productividad, apuntes digitales, gestión de ideas">
  <meta name="author" content="Alicia">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MindDrop | Organiza tus notas e ideas de forma simple">
  <meta property="og:description"
    content="MindDrop es la aplicación web ideal para estudiantes y profesionales. Organiza tus anotaciones personales, materiales de estudio y tareas en un flujo dinámico.">
  <!-- cuando tenga preview agregar -->
  <meta property="og:image" content="/preview-image.jpg">
  <!-- cuando este listo agregar url real -->
  <meta property="og:url" content="https://minddrop.vercel.app">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MindDrop | Organiza tus notas e ideas de forma simple">
  <meta name="twitter:description"
    content="MindDrop es la aplicación web ideal para estudiantes y profesionales. Organiza tus anotaciones personales, materiales de estudio y tareas en un flujo dinámico.">
  <!-- cuando tenga preview agregar -->
  <meta name="twitter:image" content="/preview-image.jpg">

</head>

  <div id="root"></div>

  <!-- Punto de entrada de Vite -->
  <script type="module" src="/src/main.jsx"></script>

</html>
